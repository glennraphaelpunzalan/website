<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
</head>
<body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
        <img src="envelope.png" alt="Envelope" id="envelope" />
        <p>Letter for you</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
        <div class="photo-frame visible">
            <img src="dog_heart.gif" class="dog" id="letter-dog" />
        </div>

        <div class="letter-window">
            <h1>Hi there!</h1>

            <div class="buttons" id="letter-buttons">
                <img src="yes.png" class="btn yes-btn" alt="Yes" />
                <img src="no.png" class="btn no-btn" alt="No" />
            </div>

            <!-- Step 1: Activity -->
            <div class="options" id="activity-container" style="display:none">
                <h2>What should we do?</h2>
                <div class="option-buttons">
                    <button class="option-btn" data-choice="Coffee ☕">Coffee</button>
                    <button class="option-btn" data-choice="Movie 🎬">Movie</button>
                    <button class="option-btn" data-choice="Dinner 🍝">Dinner</button>
                    <button class="option-btn" data-choice="Picnic 🧺">Picnic</button>
                </div>
            </div>

            <!-- Step 2: Date -->
            <div class="options" id="date-container" style="display:none">
                <h2>Pick a date</h2>
                <input type="date" id="date-input" class="picker-input" />
                <button class="option-btn" id="date-next">Next</button>
            </div>

            <!-- Step 3: Time -->
            <div class="options" id="time-container" style="display:none">
                <h2>Pick a time</h2>
                <input type="time" id="time-input" class="picker-input" />
                <button class="option-btn" id="time-next">Next</button>
            </div>

            <p id="final-text" class="final-text" style="display:none">
                <strong>Thank you for your time!</strong>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
